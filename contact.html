<!doctype html>
<html lang="fr">
<head>

  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container header__inner">
      <a class="brand" href="index.html"><img src="assets/img/logo.png" alt="ID cars" /></a>
      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="annonces.html">Annonces</a>
        <a href="avis.html">Avis</a>

  <main class="container">
    <section class="card">
      <h1>Contact</h1>
      <p>Une question ? Écris-nous.</p>
      <form class="form" action="mailto:contact@exemple.com" method="post" enctype="text/plain">
        <input name="name" placeholder="Votre nom" required />
        <input name="email" type="email" placeholder="Votre email" required />
        <textarea name="message" placeholder="Votre message" required></textarea>
        <button class="btn btn--primary" type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <footer class="footer"><div class="container">ID cars — Contact</div></footer>
  <script type="module" src="assets/js/firebase-config.js"></script>
